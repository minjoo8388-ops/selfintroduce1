<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자기소개</title>

  <style>
    body {
      background-color: white;
      padding: 40px;
    }

    .title {
      margin-bottom: 30px;
      color: #2c4a63;
    }

    .A {
      display: flex;
      gap: 20px;
    }

    .card {
      background: white;
      border: 2px solid #2c4a63;
      width: 250px;
      padding: 20px;
      position: relative;
    }

    .card h2 {
      background: #f3b8c1;
      padding: 10px;
      margin: -20px -20px 20px -20px;
      color: #2c4a63;
      text-align: center;
      font-size: 18px;
      font-weight:4000
    }
    .B{
      color:#2c4a63;
      font-size:18px;
    }
    .C{
      font-weight: 700;
    }

    img {
  width: 30px;
    }
    button { background-color: #f3b8c1;}
  </style>

</head>
<body>

  <h1 class="title">20252779 글로벌미디어학부 김민주</h1>

  <div class="A">

    <div class="card">
      <h2>나는 이런 사람</h2>
      <p>제가 요즘 빠져있는 것은 옷 쇼핑과 노래 듣기입니다</p>
    </div>

    <div class="card">
      <h2>나의 무기</h2>
      <p>책임감 있는 성격<br>포토샵, 피그마 등의 툴 경험</p>
    </div>

    <div class="card">
      <h2>이런 팀원을 찾습니다</h2>
      <p>소통하며 함께 배우고 성장할 수 있는 팀원을 만나고 싶습니다.</p>
    </div>

    <div class="card">
      <h2>나의 목표</h2>
      <p>원하는 웹페이지를 스스로 만들 수 있는 능력을 키우고 싶습니다.</p>
    </div>

  </div>
  <br>
  <div class="B">
  <p class="C">같이 팀을 하시겠습니까?</p>
  <button type="button">예</button>
  <button type="submit">아니오</button>
  </div>

</body>
</html>
